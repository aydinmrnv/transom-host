name: host

on:
  push:
    branches: [main]
    paths: ['host/**', '.github/workflows/host.yml']
  pull_request:
    paths: ['host/**', '.github/workflows/host.yml']

concurrency:
  group: host-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: host

jobs:
  build:
    name: build + lint (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Lint (swift-format)
        run: swift format lint --recursive Sources Package.swift
